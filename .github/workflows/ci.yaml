name: CI

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: write   # create tags + releases
  packages: write   # push image to ghcr

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.semver.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semver
        id: semver
        uses: paulhatch/semantic-version@v5.1.0
        with:
          bump_each_commit: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install namedreturns
        run: go install github.com/nikogura/namedreturns@latest

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      # kustomize + helm so `make test` can render the distro (test-distro).
      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: make lint

      - name: Test (code + distro)
        run: make test

  publish:
    name: Publish + Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # QEMU registers binfmt handlers so buildx can assemble the arm64 layer
      # on an amd64 runner; the Go build itself cross-compiles natively.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/nikogura/geoip-authz:${{ needs.test.outputs.version_tag }}
            ghcr.io/nikogura/geoip-authz:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # Publish the chart as an OCI artifact to ghcr alongside the image.
      - name: Package and push Helm chart
        run: |
          VERSION="${{ needs.test.outputs.version_tag }}"
          VERSION="${VERSION#v}"
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          helm package charts/geoip-authz --version "$VERSION" --app-version "$VERSION"
          helm push "geoip-authz-${VERSION}.tgz" oci://ghcr.io/nikogura/charts

      # Auto-release: creates the git tag and a GitHub Release for this version.
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.test.outputs.version_tag }}
          name: ${{ needs.test.outputs.version_tag }}
          generate_release_notes: true

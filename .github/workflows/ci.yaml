name: CI

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: write   # create tags + releases
  packages: write   # push image to ghcr

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.semver.outputs.version_tag }}
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compute the next semantic version from commit messages since the last
      # tag (conventional-commits style):
      #   - MAJOR  → a "type!:" subject (e.g. "feat!: ...") OR a "BREAKING CHANGE:"
      #              / "BREAKING-CHANGE:" footer anywhere in a commit body.
      #   - MINOR  → a "feat:" / "feat(scope):" subject.
      #   - PATCH  → anything else.
      # Outputs `version` (1.2.3) and `version_tag` (v1.2.3). bump_each_commit was
      # on before, which ignored commit messages and could only ever increment —
      # breaking changes and feat: minors were impossible to release correctly.
      - name: Generate Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          version_format: "${major}.${minor}.${patch}"
          major_pattern: '/^[a-z]+(\([^)]+\))?!:|BREAKING[ -]CHANGE:/'
          major_regexp_flags: "im"
          minor_pattern: '/^feat(\([^)]+\))?:/'
          minor_regexp_flags: "im"
          search_commit_body: true
          bump_each_commit: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install namedreturns
        run: go install github.com/nikogura/namedreturns@latest

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      # kustomize + helm so `make test` can render the distro (test-distro).
      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint
        run: make lint

      - name: Test (code + distro)
        run: make test

  publish:
    name: Publish + Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # QEMU registers binfmt handlers so buildx can assemble the arm64 layer
      # on an amd64 runner; the Go build itself cross-compiles natively.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.test.outputs.version }}
          tags: |
            ghcr.io/nikogura/geoip-authz:${{ needs.test.outputs.version_tag }}
            ghcr.io/nikogura/geoip-authz:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      # Publish the chart as an OCI artifact to ghcr alongside the image.
      - name: Package and push Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/geoip-authz \
            --version ${{ needs.test.outputs.version }} \
            --app-version ${{ needs.test.outputs.version }}
          helm push "geoip-authz-${{ needs.test.outputs.version }}.tgz" oci://ghcr.io/nikogura/charts

      # The release creates the git tag (single `v` prefix) and the GitHub Release.
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.test.outputs.version_tag }}
          name: ${{ needs.test.outputs.version_tag }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

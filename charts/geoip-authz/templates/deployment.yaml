apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "geoip-authz.fullname" . }}
  labels:
    {{- include "geoip-authz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "geoip-authz.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "geoip-authz.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: geoip-authz
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "geoip-authz.fullname" . }}
            {{- if include "geoip-authz.useSecret" . }}
            - secretRef:
                name: {{ include "geoip-authz.secretName" . }}
            {{- end }}
          {{- with .Values.otlpEndpoint }}
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ . | quote }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if .Values.hotReload }}
          volumeMounts:
            - name: blocklist
              mountPath: /etc/geoip-authz/blocklist
              readOnly: true
          {{- end }}
      {{- if .Values.hotReload }}
      volumes:
        # Mounted ConfigMap; the kubelet updates it in place and geoip-authz
        # hot-reloads, so a policy edit needs no pod restart.
        - name: blocklist
          configMap:
            name: {{ include "geoip-authz.fullname" . }}-blocklist
      {{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "geoip-authz.fullname" . }}
  labels:
    {{- include "geoip-authz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "geoip-authz.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "geoip-authz.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: geoip-authz
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          {{- if include "geoip-authz.useSecret" . }}
          envFrom:
            # MaxMind basic-auth creds only — all other config is the mounted
            # config.yaml, not env.
            - secretRef:
                name: {{ include "geoip-authz.secretName" . }}
          {{- end }}
          {{- with .Values.otlpEndpoint }}
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ . | quote }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Whole-ConfigMap directory mount (NOT subPath) so the kubelet
            # updates config.yaml in place and the service hot-reloads it.
            - name: config
              mountPath: /etc/geoip-authz
              readOnly: true
      volumes:
        # Single config file as a mounted ConfigMap; the kubelet updates it in
        # place and geoip-authz hot-reloads mode/failClosed/blocklist, so a
        # policy edit needs no pod restart.
        - name: config
          configMap:
            name: {{ include "geoip-authz.fullname" . }}

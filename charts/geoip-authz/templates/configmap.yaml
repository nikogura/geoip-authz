{{- /*
Render the single source-of-truth config.yaml from values. The hot-reloadable
subset (mode, failClosed, blocklist) and the boot settings all live here; the
service reads it from /etc/geoip-authz/config.yaml and re-reads it on a timer.
MaxMind credentials are NOT here — they come from the Secret.
*/}}
{{- $cfg := dict "mode" .Values.mode "failClosed" .Values.failClosed }}
{{- $bl := dict }}
{{- if .Values.blockedCountries }}{{- $_ := set $bl "countries" .Values.blockedCountries }}{{- end }}
{{- if .Values.blockedRegions }}{{- $_ := set $bl "regions" .Values.blockedRegions }}{{- end }}
{{- $_ := set $cfg "blocklist" $bl }}
{{- with .Values.downloadURL }}{{- $_ := set $cfg "geoDownloadURL" . }}{{- end }}
{{- with .Values.clientIPHeader }}{{- $_ := set $cfg "clientIPHeader" . }}{{- end }}
{{- with .Values.refreshEvery }}{{- $_ := set $cfg "refreshEvery" . }}{{- end }}
{{- with .Values.reloadEvery }}{{- $_ := set $cfg "reloadEvery" . }}{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geoip-authz.fullname" . }}
  labels:
    {{- include "geoip-authz.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- toYaml $cfg | nindent 4 }}

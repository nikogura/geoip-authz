{{- if .Values.hotReload }}
# Blocklist policy as files (keys become files when mounted). The kubelet updates
# a mounted ConfigMap in place, and geoip-authz re-reads it on a timer, so editing
# this ConfigMap changes the policy WITHOUT a pod restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geoip-authz.fullname" . }}-blocklist
  labels:
    {{- include "geoip-authz.labels" . | nindent 4 }}
data:
  countries: {{ .Values.blockedCountries | join "\n" | quote }}
  regions: {{ .Values.blockedRegions | join "\n" | quote }}
{{- end }}

# MaxMind credentials for downloading the GeoLite2-City database.
# REPLACE the placeholders — and in production source these from a secrets
# manager (Vault, External Secrets, SOPS) rather than committing them.
# Omit this Secret entirely (and the secretRef in deployment.yaml) if you use
# GEOIP_DB_PATH or an unauthenticated mirror — the credentials are optional.
apiVersion: v1
kind: Secret
metadata:
  name: geoip-authz
type: Opaque
stringData:
  GEOIP_ACCOUNT_ID: "REPLACE_ME"
  GEOIP_LICENSE_KEY: "REPLACE_ME"

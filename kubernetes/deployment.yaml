apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoip-authz
  labels:
    app: geoip-authz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geoip-authz
  template:
    metadata:
      labels:
        app: geoip-authz
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: geoip-authz
          image: ghcr.io/nikogura/geoip-authz:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            # MaxMind basic-auth creds (GEOIP_ACCOUNT_ID / GEOIP_LICENSE_KEY).
            # Everything else is the mounted config.yaml, not env.
            - secretRef:
                name: geoip-authz   # optional — remove if not using MaxMind creds
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              # Working set is the in-memory GeoLite2-City DB (~130Mi+ and growing);
              # request must cover it or the pod runs Burstable and risks eviction.
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Whole-ConfigMap directory mount (NOT subPath) so the kubelet
            # updates config.yaml in place and the service hot-reloads it.
            - name: config
              mountPath: /etc/geoip-authz
              readOnly: true
      volumes:
        # Single config file as a mounted ConfigMap; updated in place by the
        # kubelet and hot-reloaded by the service, so a policy edit (mode,
        # failClosed, blocklist) needs no pod restart.
        - name: config
          configMap:
            name: geoip-authz
